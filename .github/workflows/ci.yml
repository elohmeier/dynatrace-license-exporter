name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Check module files
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - name: Vet
        run: go vet ./...
      - name: Test with race detector and coverage
        run: |
          go test ./... -race -covermode=atomic -coverprofile=coverage.out
          go tool cover -func=coverage.out | tee /tmp/coverage.txt
          coverage="$(awk '/^total:/ {gsub("%", "", $3); print $3}' /tmp/coverage.txt)"
          awk -v coverage="$coverage" 'BEGIN { if (coverage + 0 < 80) { printf "coverage %.1f%% is below 80%%\n", coverage; exit 1 } }'
      - name: Build
        run: go build ./...

  release-config:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check
